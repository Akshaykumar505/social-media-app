<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Social Media App</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <h1 class="auth-logo">✨ Connectly</h1>
      <p class="text-secondary auth-subtitle">Create your account</p>

      <form id="registerForm">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="input" placeholder="johndoe" required />
        </div>

        <div class="input-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" class="input" placeholder="John Doe" />
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="input" placeholder="you@example.com" required />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input" placeholder="At least 6 characters" required />
        </div>

        <p id="errorMsg" class="error-text hidden"></p>

        <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
      </form>

      <p class="auth-switch text-secondary">
        Already have an account? <a href="login.html" class="auth-link">Login</a>
      </p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
