<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Social Media App</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <h1 class="auth-logo">✨ Connectly</h1>
      <p class="text-secondary auth-subtitle">Login to your account</p>

      <form id="loginForm">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="input" placeholder="you@example.com" required />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input" placeholder="••••••••" required />
        </div>

        <p id="errorMsg" class="error-text hidden"></p>

        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>

      <p class="auth-switch text-secondary">
        Don't have an account? <a href="register.html" class="auth-link">Sign up</a>
      </p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
